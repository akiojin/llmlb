name: Auto Merge Allowed PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge for allowed authors
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJson('["akiojin","dependabot[bot]"]'), github.event.pull_request.user.login)
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" --auto --merge --repo "${{ github.repository }}"
