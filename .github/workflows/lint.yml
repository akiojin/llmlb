# Lint Workflow
# 機能ID: SPEC-47c6f44c (quality-checks.ymlから分離)
# 目的: コード品質チェック（フォーマット、lint、ドキュメント）
# 要件: FR-004 (Rust lint), FR-005 (commitlint), FR-006 (markdownlint)

name: Lint

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop

jobs:
  # パス変更検出（Rustジョブの条件付き実行用）
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'llmlb/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/lint.yml'

  rust-lint:
    # 要件: FR-004
    # 目的: Rust lintチェック（fmt, clippy）
    name: Rust Format & Clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Bootstrap pest_generator
        run: |
          if [ -f vendor/pest_generator/bootstrap/Cargo.toml ]; then
            cargo build --manifest-path vendor/pest_generator/bootstrap/Cargo.toml
          else
            echo "Skipping pest_generator bootstrap: vendor/pest_generator/bootstrap/Cargo.toml not found"
          fi

      - name: Run cargo fmt
        run: |
          echo "🎨 Checking Rust formatting..."
          cargo fmt --all -- --check

      - name: Run cargo clippy
        run: |
          echo "🔍 Running Rust linter..."
          cargo clippy --all-targets --all-features -- -D warnings

  markdownlint:
    # 要件: FR-006
    # 目的: マークダウンファイルのスタイル違反を検出
    name: Markdown Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Run markdownlint
        run: |
          echo "📄 Checking Markdown files..."
          pnpm dlx markdownlint-cli2 "**/*.md" "!node_modules" "!.git" "!.github" "!.worktrees" "!CHANGELOG.md"

  commitlint:
    # 要件: FR-005
    # 目的: コミットメッセージがConventional Commits準拠かチェック
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Install commitlint
        run: |
          echo "📦 Installing commitlint..."
          pnpm install --frozen-lockfile

      - name: Check commit messages
        run: |
          echo "📝 Checking commit messages..."
          echo "Base ref: ${{ github.base_ref }}"
          chmod +x scripts/checks/check-commits.sh
          scripts/checks/check-commits.sh --from "origin/${{ github.base_ref }}" --to HEAD
