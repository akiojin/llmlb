# Test Workflow
# 機能ID: SPEC-47c6f44c (quality-checks.ymlから分離)
# 目的: テスト実行とタスク完了チェック
# 要件: FR-002 (tasks.md check), FR-003 (Rust tests), OpenAI API tests

name: Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop

jobs:
  # パス変更検出（C++/Rustジョブの条件付き実行用）
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'llmlb/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/test.yml'
            e2e:
              - 'llmlb/tests/e2e-playwright/**'
              - 'llmlb/src/dashboard/**'
              - '.github/workflows/test.yml'

  rust-test:
    # 要件: FR-003
    # 目的: Rustテストを実行（複数OS）
    name: Rust Tests (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        rust: [stable]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}

      - name: Bootstrap pest_generator
        run: |
          if [ -f vendor/pest_generator/bootstrap/Cargo.toml ]; then
            cargo build --manifest-path vendor/pest_generator/bootstrap/Cargo.toml
          else
            echo "Skipping pest_generator bootstrap: vendor/pest_generator/bootstrap/Cargo.toml not found"
          fi
        shell: bash

      - name: Run Rust tests
        run: |
          echo "🧪 Running Rust tests on ${{ matrix.os }}..."
          cargo test --all-features --workspace -- --test-threads=1

  openai-proxy-tests:
    # 要件: OpenAI互換APIの回帰テスト
    # 目的: OpenAI APIとの互換性を確認
    name: OpenAI API Compatibility Tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Bootstrap pest_generator
        run: |
          if [ -f vendor/pest_generator/bootstrap/Cargo.toml ]; then
            cargo build --manifest-path vendor/pest_generator/bootstrap/Cargo.toml
          else
            echo "Skipping pest_generator bootstrap: vendor/pest_generator/bootstrap/Cargo.toml not found"
          fi

      - name: Run OpenAI proxy tests
        run: |
          echo "🤖 Running OpenAI-compatible API tests..."
          make openai-tests

  playwright-e2e:
    # 要件: E2Eテスト（ダッシュボード・Playground）
    # 目的: Playwright によるブラウザE2Eテスト
    name: Playwright E2E Tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Bootstrap pest_generator
        run: |
          if [ -f vendor/pest_generator/bootstrap/Cargo.toml ]; then
            cargo build --manifest-path vendor/pest_generator/bootstrap/Cargo.toml
          else
            echo "Skipping pest_generator bootstrap: vendor/pest_generator/bootstrap/Cargo.toml not found"
          fi

      - name: Build llmlb
        # Use debug build to enable sk_debug API key for E2E tests
        run: cargo build -p llmlb

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Install Playwright dependencies
        working-directory: llmlb/tests/e2e-playwright
        run: |
          pnpm install
          pnpm exec playwright install --with-deps chromium

      - name: Start llmlb server
        run: |
          mkdir -p llmlb/tests/e2e-playwright/.llmlb/logs
          LLMLB_DATABASE_URL=sqlite:llmlb/tests/e2e-playwright/.llmlb/router.db \
          LLMLB_LOG_DIR=llmlb/tests/e2e-playwright/.llmlb/logs \
          ADMIN_USERNAME=admin \
          ADMIN_PASSWORD=test \
          ./target/debug/llmlb &
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://127.0.0.1:32768/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      - name: Run Playwright tests
        working-directory: llmlb/tests/e2e-playwright
        run: pnpm exec playwright test --reporter=list
        env:
          SKIP_SERVER: '1'
          BASE_URL: 'http://127.0.0.1:32768'
          CI: 'true'

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: llmlb/tests/e2e-playwright/reports/
          retention-days: 7
