openapi: 3.1.0
info:
  title: LLM Load Balancer API
  version: "0.1.0"
  description: >
    OpenAI-compatible endpoints with optional cloud routing by model prefix
    (openai:/google:/anthropic:).
servers:
  - url: http://localhost:32768
paths:
  /v1/messages:
    post:
      summary: Anthropic Messages API (local or Anthropic Cloud)
      parameters:
        - in: header
          name: x-api-key
          required: true
          schema:
            type: string
        - in: header
          name: anthropic-version
          required: true
          schema:
            type: string
        - in: header
          name: anthropic-beta
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessageRequest"
      responses:
        "200":
          description: Anthropic message response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicMessageResponse"
            text/event-stream:
              schema:
                type: string
                description: Anthropic SSE stream
        "400":
          description: Invalid Anthropic request
        "401":
          description: Missing or invalid Anthropic-compatible auth header
        "403":
          description: Insufficient API key permission
  /v1/chat/completions:
    post:
      summary: Chat completion (local or cloud depending on model prefix)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          description: Invalid request or unsupported prefix
        "401":
          description: Missing or invalid cloud API key
  /v1/completions:
    post:
      summary: Text completion (legacy)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletionRequest"
      responses:
        "200":
          description: Completion response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionResponse"
  /v1/embeddings:
    post:
      summary: Embeddings generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingRequest"
      responses:
        "200":
          description: Embedding vectors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingResponse"
  /api/dashboard/stats:
    get:
      summary: LLM Load Balancer stats including cloud key presence flags
      responses:
        "200":
          description: Current stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    AnthropicMessageRequest:
      type: object
      properties:
        model:
          type: string
          example: anthropic:claude-3-7-sonnet
        max_tokens:
          type: integer
          minimum: 1
        system:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/AnthropicTextBlock"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicInputMessage"
        temperature:
          type: number
        top_p:
          type: number
        stop_sequences:
          type: array
          items:
            type: string
        stream:
          type: boolean
      required: [model, max_tokens, messages]
    AnthropicInputMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/AnthropicTextBlock"
      required: [role, content]
    AnthropicTextBlock:
      type: object
      properties:
        type:
          type: string
          enum: [text]
        text:
          type: string
      required: [type, text]
    AnthropicMessageResponse:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [message]
        role:
          type: string
          enum: [assistant]
        model:
          type: string
        content:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicTextBlock"
        stop_reason:
          type: [string, "null"]
        stop_sequence:
          type: [string, "null"]
        usage:
          type: object
          properties:
            input_tokens:
              type: integer
            output_tokens:
              type: integer
    ChatRequest:
      type: object
      properties:
        model:
          type: string
          example: openai:gpt-4o
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        stream:
          type: boolean
      required: [model, messages]
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string
      required: [role, content]
    ChatResponse:
      type: object
      properties:
        id:
          type: string
        model:
          type: string
        choices:
          type: array
          items:
            $ref: "#/components/schemas/ChatChoice"
    ChatChoice:
      type: object
      properties:
        index:
          type: integer
        message:
          $ref: "#/components/schemas/ChatMessage"
        finish_reason:
          type: string
    CompletionRequest:
      type: object
      properties:
        model:
          type: string
        prompt:
          type: string
        stream:
          type: boolean
      required: [model, prompt]
    CompletionResponse:
      type: object
      properties:
        id:
          type: string
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              index:
                type: integer
    EmbeddingRequest:
      type: object
      properties:
        model:
          type: string
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
      required: [model, input]
    EmbeddingResponse:
      type: object
      properties:
        model:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              embedding:
                type: array
                items:
                  type: number
              index:
                type: integer
    DashboardStats:
      type: object
      properties:
        total_runtimes:
          type: integer
        online_runtimes:
          type: integer
        offline_runtimes:
          type: integer
        total_requests:
          type: integer
        successful_requests:
          type: integer
        failed_requests:
          type: integer
        total_active_requests:
          type: integer
        average_response_time_ms:
          type: [number, "null"]
        average_gpu_usage:
          type: [number, "null"]
        average_gpu_memory_usage:
          type: [number, "null"]
        last_metrics_updated_at:
          type: [string, "null"]
          format: date-time
        last_registered_at:
          type: [string, "null"]
          format: date-time
        last_seen_at:
          type: [string, "null"]
          format: date-time
        openai_key_present:
          type: boolean
        google_key_present:
          type: boolean
        anthropic_key_present:
          type: boolean
